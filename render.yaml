services:
  - type: web
    name: security-gap-analyzer
    env: docker
    plan: free
    dockerCommand: gunicorn --bind 0.0.0.0:8000 --workers 2 --timeout 120 app:app
    envVars:
      - key: USE_OLLAMA
        value: 0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: PORT
        value: 8000
